<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Arcadequiz 2026 fan prediction lab</title>
  <desc id="desc">Original neon football prediction artwork with a fantasy cup, group board, mascot-style fan stickers, and a glowing 26.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="58%" cy="42%" r="70%">
      <stop offset="0" stop-color="#183a6b"/>
      <stop offset=".42" stop-color="#07142f"/>
      <stop offset="1" stop-color="#030713"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset=".48" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ad"/>
      <stop offset=".4" stop-color="#facc15"/>
      <stop offset=".72" stop-color="#b7791f"/>
      <stop offset="1" stop-color="#fff3bf"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.38 0 0 0 0 0.91 0 0 0 0 1 0 0 0 .85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#facc15" flood-opacity=".48"/>
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".32"/>
    </filter>
    <clipPath id="round">
      <rect x="0" y="0" width="1400" height="760" rx="42"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
