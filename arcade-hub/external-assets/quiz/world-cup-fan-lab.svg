        <circle cx="62" cy="58" r="7" fill="#07111f"/><circle cx="96" cy="58" r="7" fill="#07111f"/>
        <text x="79" y="154" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="22" font-weight="900">VAR?</text>
