      <path d="M150 20c42 0 70 28 70 72 0 38-18 70-44 92 8 60 28 120 72 174H52c44-54 64-114 72-174-26-22-44-54-44-92 0-44 28-72 70-72Z" fill="url(#gold)"/>
      <path d="M93 94c-40 4-62 28-58 66 5 42 42 62 76 64l6-28c-24-2-46-14-49-40-3-22 12-36 36-38Z" fill="none" stroke="#facc15" stroke-width="20" stroke-linecap="round"/>
      <path d="M207 94c40 4 62 28 58 66-5 42-42 62-76 64l-6-28c24-2 46-14 49-40 3-22-12-36-36-38Z" fill="none" stroke="#facc15" stroke-width="20" stroke-linecap="round"/>
