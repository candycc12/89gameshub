    <path d="M-40 86C175-10 338 118 504 68c188-56 308-88 492 40 160 112 286 34 456-54" fill="none" stroke="#7df9ff" stroke-width="8" opacity=".75" filter="url(#softGlow)"/>
    <path d="M-30 190C164 100 312 188 506 150c212-42 314-22 494 88 128 78 252 28 430-50" fill="none" stroke="#facc15" stroke-width="5" opacity=".76"/>
    <path d="M-10 584C160 470 328 582 492 536c214-60 322-74 526 42 140 80 254 64 392-18" fill="none" stroke="#a78bfa" stroke-width="7" opacity=".78" filter="url(#softGlow)"/>

