          <rect width="178" height="34" rx="10" fill="#f8fafc"/><text x="16" y="23" fill="#07111f">🇫🇷 FRA</text>
          <rect y="44" width="178" height="34" rx="10" fill="#f8fafc"/><text x="16" y="67" fill="#07111f">🇦🇷 ARG</text>
          <rect y="88" width="178" height="34" rx="10" fill="#f8fafc"/><text x="16" y="111" fill="#07111f">🇪🇸 ESP</text>
          <rect y="132" width="178" height="34" rx="10" fill="#f8fafc"/><text x="16" y="155" fill="#07111f">🏴 ENG</text>
        </g>
