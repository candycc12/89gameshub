  <div class="site-shell">
    <header class="topbar">

      <section class="category-panels" id="category-panels"></section>

      <section class="section-head all-head" id="all-games">
        <h2>全部游戏</h2>
        <span id="count"></span>
      </section>
      <section class="filters" id="filters"></section>

    <footer class="site-footer">
