[build]
  publish = "."
  command = "python3 arcade-hub/scripts/generate_sitemap.py"

[build.environment]
  SITE_URL = "https://YOUR_DOMAIN_HERE"

[[redirects]]
  from = "/"
  to = "/arcade-hub/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/arcade-hub/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
